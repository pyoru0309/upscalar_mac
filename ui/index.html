<!DOCTYPE html>
<html lang="ja">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Upscalar</title>
    <style>
      :root {
        color-scheme: dark;
      }
      html,
      body {
        margin: 0;
        height: 100%;
      }
      body {
        display: flex;
        flex-direction: column;
        align-items: center;
        justify-content: center;
        gap: 1.2rem;
        font-family: ui-sans-serif, -apple-system, "Hiragino Kaku Gothic ProN",
          "Helvetica Neue", Arial, sans-serif;
        background: radial-gradient(circle at 50% 30%, #1f2937, #0b1120);
        color: #e5e7eb;
      }
      h1 {
        margin: 0;
        font-size: 1.6rem;
        letter-spacing: 0.04em;
      }
      .spinner {
        width: 42px;
        height: 42px;
        border: 4px solid rgba(148, 163, 184, 0.25);
        border-top-color: #60a5fa;
        border-radius: 50%;
        animation: spin 0.9s linear infinite;
      }
      @keyframes spin {
        to {
          transform: rotate(360deg);
        }
      }
      #status {
        font-size: 0.95rem;
        color: #94a3b8;
        max-width: 80%;
        text-align: center;
        white-space: pre-wrap;
      }
      #status.error {
        color: #fca5a5;
      }
    </style>
  </head>
  <body>
    <div class="spinner" id="spinner"></div>
    <h1>Upscalar</h1>
    <div id="status">バックエンドを起動しています…</div>
    <script>
      // Rust 側から起動失敗時に呼ばれる。
      window.upscalarError = function (message) {
        const status = document.getElementById("status");
        const spinner = document.getElementById("spinner");
        if (spinner) spinner.style.display = "none";
        if (status) {
          status.classList.add("error");
          status.textContent = message;
        }
      };
    </script>
  </body>
</html>
